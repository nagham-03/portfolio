<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>158303_Nagham Dagamseh - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="contact.html" class="active">Contact Me</a></li>
        </ul>
    </nav>

    <div class="container">

        <section class="section">
            <h2>Contact Me</h2>
            <p>Feel free to reach out to me by filling out the form below:</p>
            
            <hr>

            <form id="contactForm" onsubmit="return validateForm(event)">
                <div class="form-group">
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" placeholder="Enter your email address">
                </div>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" rows="5" placeholder="Write your message here..."></textarea>
                </div>

                <div id="error-message" class="error-msg"></div>

                <br>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </section>

    </div>

   
    <script>
        function validateForm(event) {
            event.preventDefault(); // منع إعادة تحميل الصفحة

            var name = document.getElementById("fullname").value.trim();
            var email = document.getElementById("email").value.trim();
            var message = document.getElementById("message").value.trim();
            var errorElement = document.getElementById("error-message");

            errorElement.innerText = "";
            errorElement.style.color = "red";

            // 1. التاكد من تعبئة جميع الحقول
            if (name === "" || email === "" || message === "") {
                errorElement.innerText = "Please fill in all the required fields!";
                return false;
            }

            // 2. التحقق من صيغة الإيميل (@ و .)
            var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                errorElement.innerText = "Please enter a valid email address!";
                return false;
            }

            // عند النجاح
            errorElement.style.color = "green";
            errorElement.innerText = "Thank you, " + name + "! Your message has been sent successfully.";
            
            document.getElementById("contactForm").reset();
            return true;
        }
    </script>

</body>
</html>
